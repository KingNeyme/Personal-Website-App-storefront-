backend:
  name: github
  repo: KingNeyme/Personal-Website-App-storefront-
  branch: main
  base_url: https://caribai-cms-auth.vercel.app
  preview_context: vercel

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://caribailabs.vercel.app"
display_url: "https://caribailabs.vercel.app"
publish_mode: editorial_workflow

collections:
  - name: "blog"
    label: "Blog"
    files:
      - label: "Blog Posts"
        name: "posts"
        file: "content/blog/posts.json"
        format: "json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Slug", name: "slug", widget: "string", hint: "Use lowercase words separated by hyphens." }
              - { label: "Publish Date", name: "publishDate", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
              - { label: "Cover Image", name: "coverImage", widget: "image", required: false }
              - { label: "Cover Video", name: "coverVideo", widget: "file", required: false }
              - { label: "Excerpt", name: "excerpt", widget: "text" }
              - { label: "Body", name: "body", widget: "markdown" }

  - name: "site"
    label: "Site Content"
    files:
      - label: "Home Page"
        name: "home"
        file: "content/site/home.json"
        format: "json"
        fields:
          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Hero Image", name: "image", widget: "image", required: false }
              - { label: "Hero Image Alt", name: "imageAlt", widget: "string", required: false }
              - label: "Buttons"
                name: "actions"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Link", name: "href", widget: "string" }
                  - label: "Variant"
                    name: "variant"
                    widget: "select"
                    options: ["primary", "secondary"]
              - { label: "Hero Points", name: "points", widget: "list" }
              - label: "Hero Cards"
                name: "metrics"
                widget: "list"
                summary: "{{fields.label}}"
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
          - label: "Positioning"
            name: "positioning"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
          - label: "Structure"
            name: "structure"
            widget: "object"
            fields:
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.title}}"
                fields:
                  - { label: "Badge", name: "badge", widget: "string" }
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Featured", name: "featured", widget: "boolean", required: false, default: false }
                  - { label: "Muted", name: "muted", widget: "boolean", required: false, default: false }
          - label: "Storefront Section"
